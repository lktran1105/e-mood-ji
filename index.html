<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emojify — Turn Emojis Into Magic</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --amber: #F59E0B;
    --amber-light: #FCD34D;
    --coral: #F97316;
    --coral-deep: #EA580C;
    --pink: #EC4899;
    --warm-bg: #FFFBF5;
    --card-bg: #FFF9F0;
    --card-border: #FDE8CD;
    --text-primary: #1C1917;
    --text-secondary: #78716C;
    --text-muted: #A8A29E;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--warm-bg);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }

  h1, h2, h3, h4, h5 { font-family: 'Space Grotesk', sans-serif; }

  /* Floating background orbs */
  .bg-orbs { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .bg-orbs .orb {
    position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.15;
    animation: floatOrb 20s ease-in-out infinite;
  }
  .bg-orbs .orb:nth-child(1) { width: 400px; height: 400px; background: var(--coral); top: -100px; right: -100px; }
  .bg-orbs .orb:nth-child(2) { width: 300px; height: 300px; background: var(--pink); bottom: -50px; left: -50px; animation-delay: -7s; }
  .bg-orbs .orb:nth-child(3) { width: 250px; height: 250px; background: var(--amber); top: 50%; left: 50%; animation-delay: -14s; }
  @keyframes floatOrb {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(30px, -30px) scale(1.05); }
    66% { transform: translate(-20px, 20px) scale(0.95); }
  }

  .container {
    position: relative; z-index: 1;
    max-width: 800px; margin: 0 auto; padding: 60px 24px 80px;
  }

  /* Header */
  .header { text-align: center; margin-bottom: 48px; }
  .header .logo {
    font-family: 'Space Grotesk', sans-serif; font-size: 2.8rem; font-weight: 700;
    background: linear-gradient(135deg, var(--coral), var(--pink), var(--amber));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text; margin-bottom: 8px;
  }
  .header .tagline { color: var(--text-secondary); font-size: 1.1rem; }

  /* Input section */
  .input-section {
    background: white; border-radius: 28px; padding: 32px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.04); border: 1px solid var(--card-border);
    margin-bottom: 32px;
  }
  .input-section label {
    font-family: 'Space Grotesk', sans-serif; font-weight: 600; font-size: 1rem;
    display: block; margin-bottom: 4px;
  }
  .input-section .hint { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 16px; }

  .emoji-input-wrap { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
  .emoji-display {
    flex: 1; display: flex; gap: 8px; min-height: 64px; padding: 12px 16px;
    background: var(--card-bg); border-radius: 18px; border: 2px dashed var(--card-border);
    align-items: center; flex-wrap: wrap; transition: border-color 0.3s;
  }
  .emoji-display.active { border-color: var(--amber); border-style: solid; }
  .emoji-display .placeholder { color: var(--text-muted); font-size: 0.9rem; }

  .emoji-chip {
    font-size: 2rem; background: white; border-radius: 14px; padding: 6px 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06); position: relative;
    animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    cursor: pointer; transition: transform 0.2s;
  }
  .emoji-chip:hover { transform: scale(1.1); }
  .emoji-chip:hover::after {
    content: '\00d7'; position: absolute; top: -4px; right: -4px;
    background: #EF4444; color: white; font-size: 0.65rem; width: 16px; height: 16px;
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
  }
  @keyframes popIn {
    0% { transform: scale(0); opacity: 0; }
    100% { transform: scale(1); opacity: 1; }
  }

  .emoji-picker-trigger {
    width: 56px; height: 56px; border-radius: 16px; border: 2px solid var(--card-border);
    background: white; font-size: 1.5rem; cursor: pointer; transition: all 0.3s;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .emoji-picker-trigger:hover { border-color: var(--coral); transform: scale(1.05); }
  .emoji-picker-trigger:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .emoji-picker-container { position: relative; }
  .emoji-picker {
    position: absolute; top: 64px; right: 0; z-index: 50;
    background: white; border-radius: 20px; padding: 16px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.12); border: 1px solid var(--card-border);
    width: 320px; max-height: 300px; overflow-y: auto;
    opacity: 0; pointer-events: none; transform: translateY(-10px); transition: all 0.3s;
  }
  .emoji-picker.open { opacity: 1; pointer-events: auto; transform: translateY(0); }
  .emoji-picker-search {
    width: 100%; padding: 10px 14px; border-radius: 12px; border: 1px solid var(--card-border);
    font-size: 0.9rem; margin-bottom: 12px; outline: none; font-family: 'DM Sans', sans-serif;
  }
  .emoji-picker-search:focus { border-color: var(--coral); }
  .emoji-picker-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .emoji-picker-grid button {
    font-size: 1.4rem; padding: 6px; border: none; background: none;
    border-radius: 8px; cursor: pointer; transition: background 0.2s;
  }
  .emoji-picker-grid button:hover { background: var(--card-bg); }
  .emoji-category-label {
    font-size: 0.75rem; font-weight: 600; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.5px;
    margin: 8px 0 4px; grid-column: 1 / -1;
  }

  /* Mode selector */
  .mode-selector { display: flex; gap: 10px; flex-wrap: wrap; }
  .mode-btn {
    flex: 1; min-width: 120px; padding: 14px 16px; border-radius: 16px;
    border: 2px solid var(--card-border); background: white;
    font-family: 'Space Grotesk', sans-serif; font-weight: 600;
    font-size: 0.9rem; cursor: pointer; transition: all 0.3s;
    display: flex; align-items: center; gap: 8px; justify-content: center;
  }
  .mode-btn:hover { border-color: var(--amber); }
  .mode-btn.active {
    border-color: var(--coral); background: linear-gradient(135deg, #FFF7ED, #FFF1F2);
    color: var(--coral-deep);
  }

  /* Generate button */
  .generate-section { text-align: center; margin-bottom: 32px; }
  .generate-btn {
    padding: 16px 48px; border-radius: 20px; border: none;
    background: linear-gradient(135deg, var(--coral), var(--pink));
    color: white; font-family: 'Space Grotesk', sans-serif;
    font-weight: 700; font-size: 1.1rem; cursor: pointer;
    transition: all 0.3s; position: relative; overflow: hidden;
  }
  .generate-btn:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(249,115,22,0.4); }
  .generate-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .generate-btn .shimmer {
    position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    transform: translateX(-100%);
  }
  .generate-btn:not(:disabled):hover .shimmer { animation: shimmer 1.5s infinite; }
  @keyframes shimmer { 100% { transform: translateX(100%); } }

  /* Loading */
  .loading-container { text-align: center; padding: 48px; display: none; }
  .loading-container.active { display: block; }
  .loading-dots { display: flex; gap: 8px; justify-content: center; margin-bottom: 16px; }
  .loading-dots span {
    width: 12px; height: 12px; border-radius: 50%;
    background: var(--coral); animation: bounce 1.4s ease-in-out infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.16s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.32s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.4; }
    40% { transform: scale(1); opacity: 1; }
  }

  /* Result container */
  .result-container { display: none; }
  .result-container.active { display: block; animation: fadeUp 0.5s ease; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Album card */
  .album-card { border-radius: 28px; overflow: hidden; box-shadow: 0 8px 30px rgba(0,0,0,0.08); border: 1px solid var(--card-border); }
  .album-header {
    background: linear-gradient(135deg, var(--coral), var(--pink), var(--amber));
    padding: 36px 32px; text-align: center;
  }
  .album-emojis { font-size: 2.8rem; letter-spacing: 8px; margin-bottom: 8px; }
  .album-badge {
    display: inline-block; background: rgba(255,255,255,0.25); border-radius: 20px;
    padding: 4px 14px; font-size: 0.8rem; color: white; backdrop-filter: blur(5px);
  }
  .album-body { background: var(--card-bg); padding: 32px; }
  .album-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 4px; }
  .album-artist { color: var(--coral); font-weight: 600; margin-bottom: 2px; }
  .album-year { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 4px; }
  .album-genre { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 20px; }
  .album-tracklist { list-style: none; margin-bottom: 24px; }
  .album-tracklist li {
    padding: 10px 0; border-bottom: 1px solid var(--card-border);
    display: flex; align-items: center; gap: 12px; font-size: 0.95rem;
  }
  .album-tracklist li:last-child { border-bottom: none; }
  .track-num { color: var(--text-muted); font-size: 0.85rem; min-width: 20px; }
  .track-emoji { font-size: 1.2rem; }
  .album-review {
    background: white; border-radius: 16px; padding: 20px; border: 1px solid var(--card-border);
  }
  .album-review p { color: var(--text-secondary); font-size: 0.9rem; line-height: 1.6; font-style: italic; }
  .album-review .reviewer { margin-top: 10px; font-style: normal; font-weight: 600; color: var(--text-primary); }

  /* Story card */
  .story-card {
    background: white; border-radius: 28px; padding: 36px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.08); border: 1px solid var(--card-border);
  }
  .story-header { display: flex; align-items: center; gap: 16px; margin-bottom: 24px; }
  .story-moon {
    width: 56px; height: 56px; border-radius: 50%;
    background: linear-gradient(135deg, var(--amber-light), var(--coral));
    display: flex; align-items: center; justify-content: center; font-size: 1.6rem;
  }
  .story-meta h3 { font-size: 1.3rem; }
  .story-meta span { color: var(--text-muted); font-size: 0.85rem; }
  .story-emojis { font-size: 2rem; letter-spacing: 6px; text-align: center; margin-bottom: 20px; }
  .story-text { color: var(--text-secondary); line-height: 1.8; font-size: 1rem; }
  .story-text p { margin-bottom: 12px; }
  .story-divider { text-align: center; color: var(--text-muted); margin: 16px 0; letter-spacing: 4px; }

  /* Constellation card */
  .constellation-card { border-radius: 28px; overflow: hidden; box-shadow: 0 8px 30px rgba(0,0,0,0.08); border: 1px solid var(--card-border); }
  .constellation-sky {
    background: linear-gradient(180deg, #0F172A, #1E293B, #334155);
    padding: 40px; position: relative; min-height: 350px;
    display: flex; align-items: center; justify-content: center;
  }
  .constellation-canvas { position: relative; width: 280px; height: 280px; }
  .constellation-star {
    position: absolute; font-size: 2rem;
    animation: twinkle 3s ease-in-out infinite;
    filter: drop-shadow(0 0 8px rgba(251,191,36,0.6)); z-index: 2;
  }
  .constellation-star:nth-child(odd) { animation-delay: 0.7s; }
  .constellation-star:nth-child(even) { animation-delay: 1.4s; }
  @keyframes twinkle {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.15); opacity: 0.8; }
  }
  .constellation-lines { position: absolute; inset: 0; z-index: 1; }
  .constellation-lines line { stroke: rgba(251,191,36,0.35); stroke-width: 1.5; stroke-dasharray: 4 4; }
  .bg-stars { position: absolute; inset: 0; overflow: hidden; }
  .bg-star {
    position: absolute; width: 2px; height: 2px; background: white;
    border-radius: 50%; opacity: 0.4;
  }
  .constellation-info { background: var(--card-bg); padding: 28px 32px; }
  .constellation-name { font-size: 1.4rem; font-weight: 700; margin-bottom: 4px; }
  .constellation-latin { color: var(--coral); font-size: 0.9rem; font-style: italic; margin-bottom: 12px; }
  .constellation-desc { color: var(--text-secondary); line-height: 1.7; font-size: 0.95rem; }
  .constellation-legend { display: flex; gap: 8px; margin-top: 16px; flex-wrap: wrap; }
  .legend-item {
    display: flex; align-items: center; gap: 6px; background: white;
    padding: 6px 12px; border-radius: 10px; font-size: 0.8rem; border: 1px solid var(--card-border);
  }
  .legend-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--amber); }

  /* Regenerate */
  .regen-btn {
    display: block; margin: 24px auto 0; padding: 12px 28px;
    border-radius: 14px; border: 2px solid var(--card-border);
    background: white; font-family: 'Space Grotesk', sans-serif;
    font-weight: 600; cursor: pointer; transition: all 0.3s;
    font-size: 0.9rem; color: var(--text-secondary);
  }
  .regen-btn:hover { border-color: var(--coral); color: var(--coral); }

  @media (max-width: 600px) {
    .container { padding: 40px 16px 60px; }
    .header .logo { font-size: 2rem; }
    .input-section { padding: 24px 20px; }
    .mode-btn { min-width: 100px; padding: 12px; font-size: 0.82rem; }
    .album-body, .constellation-info { padding: 24px 20px; }
    .story-card { padding: 24px 20px; }
    .emoji-picker { width: 280px; right: -40px; }
  }
</style>
</head>
<body>

<div class="bg-orbs"><div class="orb"></div><div class="orb"></div><div class="orb"></div></div>

<div class="container">
  <div class="header">
    <div class="logo">Emojify</div>
    <div class="tagline">Turn your emojis into something magical</div>
  </div>

  <div class="input-section">
    <label>Drop your emojis</label>
    <div class="hint">Pick 3 to 5 emojis and watch the magic happen</div>
    <div class="emoji-input-wrap">
      <div class="emoji-display" id="emojiDisplay">
        <span class="placeholder" id="emojiPlaceholder">Tap + to add emojis...</span>
      </div>
      <div class="emoji-picker-container">
        <button class="emoji-picker-trigger" id="pickerTrigger" onclick="togglePicker()">+</button>
        <div class="emoji-picker" id="emojiPicker">
          <input type="text" class="emoji-picker-search" id="emojiSearch" placeholder="Search emojis..." oninput="filterEmojis()">
          <div class="emoji-picker-grid" id="emojiGrid"></div>
        </div>
      </div>
    </div>
    <div class="mode-selector">
      <button class="mode-btn active" data-mode="album" onclick="selectMode('album')">
        <span>&#127925;</span> Album
      </button>
      <button class="mode-btn" data-mode="story" onclick="selectMode('story')">
        <span>&#127769;</span> Bedtime Story
      </button>
      <button class="mode-btn" data-mode="constellation" onclick="selectMode('constellation')">
        <span>&#11088;</span> Constellation
      </button>
    </div>
  </div>

  <div class="generate-section">
    <button class="generate-btn" id="generateBtn" onclick="generate()" disabled>
      <span class="shimmer"></span>Generate Magic &#10024;
    </button>
  </div>

  <div class="loading-container" id="loading">
    <div class="loading-dots"><span></span><span></span><span></span></div>
    <p id="loadingText">Conjuring something special...</p>
  </div>

  <div class="result-container" id="resultContainer"></div>
</div>

<script>
// =============================================
// DATA — loaded from /data/*.json
// To add albums: edit data/albums.json
// To add constellations: edit data/constellations.json
// To add emoji mappings: edit data/emojiMap.json
// =============================================
let emojiMap = {};
let albumsDB = [];
let constellationsDB = [];

async function loadData() {
  const [emojiRes, albumsRes, constRes] = await Promise.all([
    fetch('data/emojiMap.json'),
    fetch('data/albums.json'),
    fetch('data/constellations.json')
  ]);
  emojiMap = await emojiRes.json();
  albumsDB = await albumsRes.json();
  constellationsDB = await constRes.json();
}

// (inline data removed — see /data/*.json)

// =============================================
// STORY TEMPLATES
// =============================================
function pickWord(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function pickFromTags(tags, mapping, fallback) {
  const keys = Object.keys(mapping).sort(() => Math.random() - 0.5);
  for (const k of keys) { if (tags.includes(k)) return mapping[k]; }
  return fallback;
}

const storyTemplates = [
  { tags:["nature","forest","animal","gentle","calm"],
    title: (e) => `The ${pickWord(["Whispering","Enchanted","Secret","Hidden","Moonlit"])} ${pickWord(["Forest","Garden","Meadow","Grove"])}`,
    build: (e, tags) => {
      const place = pickFromTags(tags,{"forest":"deep forest","nature":"green meadow","ocean":"shimmering shore","mountain":"misty mountain","tropical":"tropical island"},"quiet little valley");
      const char = pickFromTags(tags,{"cat":"little cat","dog":"faithful puppy","rabbit":"tiny rabbit","bear":"gentle bear cub","fox":"clever fox","bird":"small songbird","owl":"wise old owl"},"curious little creature");
      const cn = char.split(" ").pop();
      return `Once upon a time, in a ${place}, there lived a ${char} who loved nothing more than watching the evening sky. ${e[0]} ${e[1]}

Every night, the ${cn} would climb to the highest spot it could find and gaze upward, wondering what stories the stars might tell. One special evening, something magical happened — a trail of shimmering light appeared, leading deeper into the ${place.split(" ").pop()}. ${e[2]}

Following the glow with wonder in its heart, the ${cn} discovered a clearing where ${e.slice(0,3).join(" ")} danced together in the moonlight, creating patterns no one had ever seen before.

${e.length > 3 ? `"Stay with us," whispered the light, and ${e[3]} appeared like a gentle promise. ` : ""}"Every night, magic happens here for those brave enough to look."

And from that evening on, the ${cn} never felt alone again — for it knew that wonder was always just a short walk away. ${e.join(" ")}

The End.`;
    }},
  { tags:["love","romantic","warm","sweet","heart"],
    title: (e) => `${e[0]} and the ${pickWord(["Warmest","Softest","Sweetest","Gentlest"])} ${pickWord(["Night","Dream","Lullaby","Wish"])}`,
    build: (e, tags) => {
      return `In a town painted in sunset colors, there was a little house where love lived in every corner. ${e[0]} ${e[1]}

The house had a magical window that showed you your happiest memory whenever you looked through it. One ${pickWord(["cozy","quiet","starlit","peaceful"])} evening, a visitor arrived — someone who had forgotten what happiness felt like.

"Look through the window," said the keeper of the house, and as the visitor peered through the glass, ${e[2]} bloomed across the scene like flowers opening for the first time.

${e.length > 3 ? `${e[3]} twinkled in the reflection, and the visitor felt a warmth spreading from their chest to their fingertips. ` : ""}The visitor's eyes grew wide. "I remember now," they whispered. "Happiness isn't something you find — it's something that's been with you all along."

${e.length > 4 ? `Outside, ${e[4]} drifted through the sky like a gentle reminder. ` : ""}And that night, as the stars hummed a lullaby, both the keeper and the visitor fell asleep knowing that the warmest place in the world is wherever love decides to stay. ${e.join(" ")}

Goodnight, little one. The End.`;
    }},
  { tags:["adventure","travel","exploring","space","brave"],
    title: (e) => `The ${pickWord(["Great","Grand","Amazing","Incredible"])} ${pickWord(["Adventure","Journey","Voyage","Quest"])} of ${e[0]}`,
    build: (e, tags) => {
      const vehicle = pickFromTags(tags,{"space":"tiny rocket ship","ocean":"little wooden boat","sky":"hot air balloon","flying":"pair of magical wings"},"enchanted bicycle");
      const dest = pickFromTags(tags,{"space":"the edge of the galaxy","ocean":"a hidden island","mountain":"the tallest peak","forest":"the heart of an ancient forest"},"a place no one had ever been");
      return `${e[0]} had always dreamed of going to ${dest}. Everyone said it was impossible, but impossible had never stopped ${e[0]} before.

One morning, ${e[0]} found a ${vehicle} waiting at the doorstep with a note that read: "For the brave. For the curious. For you." ${e[1]}

The journey was long and full of surprises. ${e[2]} appeared along the way, sometimes as a challenge, sometimes as a friend. Each one taught ${e[0]} something new about courage and wonder.

${e.length > 3 ? `At the halfway point, ${e[3]} joined the adventure, and together they were unstoppable. ` : ""}When ${e[0]} finally arrived at ${dest}, the view was more beautiful than any dream could hold.

${e.length > 4 ? `${e[4]} shimmered on the horizon like a crown for the brave. ` : ""}"The real treasure," ${e[0]} realized, "was becoming the kind of person who never stops exploring."

And with that thought warm in their heart, ${e[0]} smiled, closed their eyes, and drifted off to sleep under the stars. ${e.join(" ")}

The End.`;
    }},
  { tags:["magic","fantasy","mystical","dream","sparkle"],
    title: (e) => `The ${pickWord(["Magical","Enchanted","Wondrous","Mystical"])} ${pickWord(["Tale","Secret","Night","Dream"])} of ${e.slice(0,2).join(" ")}`,
    build: (e, tags) => {
      return `Deep in the land where dreams are made, there is a workshop run by ${e[0]}. Every night, while children sleep, ${e[0]} carefully crafts new dreams from starlight and whispered wishes.

${e[1]} was ${e[0]}'s newest apprentice, still learning the art of dream-weaving. "The most important ingredient," ${e[0]} explained, "is a sprinkle of wonder."

One night, ${e[2]} arrived with an unusual request — a dream so special it had never been made before. It needed to feel like a warm hug and sound like distant laughter.

${e.length > 3 ? `${e[3]} volunteered the secret ingredient: a memory of the happiest day that ever was. ` : ""}Together, they mixed moonbeams with giggles, painted clouds with kindness, and folded starlight into the shape of a gentle embrace.

${e.length > 4 ? `${e[4]} added the finishing touch — a tiny spark of magic that made the dream shimmer. ` : ""}When the dream was ready, they sent it floating out the window, and somewhere, a sleeping child smiled.

"That," whispered ${e[0]}, "is why we do what we do." ${e.join(" ")}

Sweet dreams. The End.`;
    }},
  { tags:["food","cooking","yummy","kitchen","delicious"],
    title: (e) => `The ${pickWord(["Midnight","Moonlit","Starlit","Cozy"])} ${pickWord(["Kitchen","Bakery","Feast","Recipe"])}`,
    build: (e, tags) => {

// =============================================
// MATCHING ENGINE
// =============================================
function getTagsFromEmojis(emojis) {
  const counts = {};
  for (const emoji of emojis) {
    const tags = emojiMap[emoji] || [];
    for (const t of tags) counts[t] = (counts[t] || 0) + 1;
  }
  return counts;
}

function scoreItem(inputCounts, itemTags) {
  let score = 0;
  for (const tag of itemTags) {
    if (inputCounts[tag]) score += inputCounts[tag] * 2;
  }
  return score + Math.random() * 1.5; // Small randomness for variety
}

let currentMode = 'album';

function buildEmojiPicker() {
  const grid = document.getElementById('emojiGrid');
  grid.innerHTML = '';
  for (const [cat, emojis] of Object.entries(emojiCategories)) {
    const label = document.createElement('div');
    label.className = 'emoji-category-label';
    label.textContent = cat;
    grid.appendChild(label);
    emojis.forEach(e => {
      const btn = document.createElement('button');
      btn.textContent = e;
      btn.onclick = () => addEmoji(e);
      btn.dataset.emoji = e;
      grid.appendChild(btn);
    });
  }
}

function filterEmojis() {
  const q = document.getElementById('emojiSearch').value.toLowerCase();
  const btns = document.querySelectorAll('#emojiGrid button');
  const labels = document.querySelectorAll('.emoji-category-label');
  if (!q) { btns.forEach(b => b.style.display = ''); labels.forEach(l => l.style.display = ''); return; }
  labels.forEach(l => l.style.display = 'none');
  // If emojiMap hasn't loaded yet, show all emojis
  if (Object.keys(emojiMap).length === 0) { btns.forEach(b => b.style.display = ''); return; }
  const matching = new Set();
  for (const [emoji, tags] of Object.entries(emojiMap)) {
    if (tags.some(t => t.includes(q)) || emoji.includes(q)) matching.add(emoji);
  }
  btns.forEach(b => { b.style.display = matching.has(b.dataset.emoji) ? '' : 'none'; });
}

function togglePicker() {
  if (selectedEmojis.length >= 5) return;
  const p = document.getElementById('emojiPicker');
  p.classList.toggle('open');
  if (p.classList.contains('open')) document.getElementById('emojiSearch').focus();
}

function addEmoji(emoji) {
  if (selectedEmojis.length >= 5) return;
  selectedEmojis.push(emoji);
  renderEmojis();
  if (selectedEmojis.length >= 5) document.getElementById('emojiPicker').classList.remove('open');
  updateBtn();
}

function removeEmoji(i) { selectedEmojis.splice(i, 1); renderEmojis(); updateBtn(); }

function renderEmojis() {
  const d = document.getElementById('emojiDisplay');
  const p = document.getElementById('emojiPlaceholder');
  document.querySelectorAll('.emoji-chip').forEach(el => el.remove());
  p.style.display = selectedEmojis.length === 0 ? '' : 'none';
  selectedEmojis.forEach((e, i) => {
    const c = document.createElement('span');
    c.className = 'emoji-chip'; c.textContent = e;
    c.onclick = () => removeEmoji(i);
    d.appendChild(c);
  });
  document.getElementById('pickerTrigger').disabled = selectedEmojis.length >= 5;
  d.classList.toggle('active', selectedEmojis.length > 0);
}

function updateBtn() { document.getElementById('generateBtn').disabled = selectedEmojis.length < 3; }

document.addEventListener('click', (e) => {
  const pk = document.getElementById('emojiPicker');
  const tr = document.getElementById('pickerTrigger');
  if (!pk.contains(e.target) && e.target !== tr) pk.classList.remove('open');
});

// =============================================
// MODE
// =============================================
function selectMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
}

// =============================================
// GENERATE
// =============================================
function generate() {
  if (selectedEmojis.length < 3) return;
  const container = document.getElementById('resultContainer');
  container.className = 'result-container';

  const loading = document.getElementById('loading');
  const texts = { album:['Searching music libraries...','Matching vibes...'], story:['Dreaming up characters...','Weaving a tale...'], constellation:['Mapping the night sky...','Connecting stars...'] };
  document.getElementById('loadingText').textContent = pickWord(texts[currentMode]);
  loading.classList.add('active');

  setTimeout(() => {
    loading.classList.remove('active');
    const tc = getTagsFromEmojis(selectedEmojis);
    if (currentMode === 'album') genAlbum(tc);
    else if (currentMode === 'story') genStory(tc);
    else genConstellation(tc);
    container.className = 'result-container active';
  }, 600 + Math.random() * 500);
}

function genAlbum(tc) {
  const scored = albumsDB.map((a,i) => ({ a, i, s: scoreItem(tc, a.tags) - (i === lastAlbumIdx ? 5 : 0) }));
  scored.sort((a,b) => b.s - a.s);
  lastAlbumIdx = scored[0].i;
  const album = scored[0].a;
  const te = selectedEmojis.concat(selectedEmojis).slice(0, album.tracks.length);
  const tracksHTML = album.tracks.map((t,i) => `<li><span class="track-num">${i+1}.</span><span class="track-emoji">${te[i]||'🎵'}</span><span>${t}</span></li>`).join('');
  document.getElementById('resultContainer').innerHTML = `
    <div class="album-card">
      <div class="album-header"><div class="album-emojis">${selectedEmojis.join(' ')}</div><div class="album-badge">&#127925; Album</div></div>
      <div class="album-body">
        <div class="album-title">${selectedEmojis.join(' ')} — ${album.title}</div>
        <div class="album-artist">${album.artist}</div><div class="album-year">${album.year}</div>
        <div class="album-genre">Genre: ${album.genre}</div>
        <div style="font-family:'Space Grotesk',sans-serif;font-weight:600;margin-bottom:8px;">Tracklist:</div>
        <ul class="album-tracklist">${tracksHTML}</ul>
        <div class="album-review"><p>"${album.review}"</p><div class="reviewer">— ${album.reviewer} ${'⭐'.repeat(Math.floor(Math.random()*2)+4)}</div></div>
      </div>
    </div><button class="regen-btn" onclick="generate()">&#x21bb; Regenerate</button>`;
}

function genStory(tc) {
  const allTags = Object.keys(tc);
  const scored = storyTemplates.map((t,i) => ({ t, i, s: scoreItem(tc, t.tags) }));
  scored.sort((a,b) => b.s - a.s);
  const tmpl = scored[0].t;
  const title = tmpl.title(selectedEmojis);
  const story = tmpl.build(selectedEmojis, allTags);
  const paras = story.split('\n\n').filter(Boolean);
  const storyHTML = paras.map(p => `<p>${p}</p>`).join('<div class="story-divider">&middot; &middot; &middot;</div>');
  document.getElementById('resultContainer').innerHTML = `
    <div class="story-card">
      <div class="story-header"><div class="story-moon">&#127769;</div><div class="story-meta"><h3>${title}</h3><span>2 min read</span></div></div>
      <div class="story-emojis">${selectedEmojis.join(' ')}</div>
      <div class="story-text">${storyHTML}</div>
    </div><button class="regen-btn" onclick="generate()">&#x21bb; Regenerate</button>`;
}

function genConstellation(tc) {
  const scored = constellationsDB.map((c,i) => ({ c, i, s: scoreItem(tc, c.tags) - (i === lastConstIdx ? 5 : 0) }));
  scored.sort((a,b) => b.s - a.s);
  lastConstIdx = scored[0].i;
  const c = scored[0].c;
  const n = selectedEmojis.length;
  const pos = c.positions.slice(0, n);
  const names = c.starNames.slice(0, n);
  const conn = c.connections.filter(([a,b]) => a < n && b < n);

  let bg = '';
  for (let i = 0; i < 60; i++) { bg += `<div class="bg-star" style="left:${Math.random()*100}%;top:${Math.random()*100}%;width:${Math.random()*2+1}px;height:${Math.random()*2+1}px;opacity:${Math.random()*0.5+0.1}"></div>`; }
  const stars = pos.map((p,i) => `<div class="constellation-star" style="left:${p.x}%;top:${p.y}%;transform:translate(-50%,-50%)">${selectedEmojis[i]}</div>`).join('');
  const lines = conn.map(([a,b]) => pos[a]&&pos[b] ? `<line x1="${pos[a].x}%" y1="${pos[a].y}%" x2="${pos[b].x}%" y2="${pos[b].y}%"/>` : '').join('');
  const legend = pos.map((_,i) => `<div class="legend-item"><div class="legend-dot"></div><span>${selectedEmojis[i]} ${names[i]}</span></div>`).join('');

  document.getElementById('resultContainer').innerHTML = `
    <div class="constellation-card">
      <div class="constellation-sky"><div class="bg-stars">${bg}</div>
        <div class="constellation-canvas"><svg class="constellation-lines" viewBox="0 0 100 100" preserveAspectRatio="none">${lines}</svg>${stars}</div>
      </div>
      <div class="constellation-info">
        <div class="constellation-name">${c.name}</div><div class="constellation-latin">${c.latin}</div>
        <div class="constellation-desc">${c.description}</div>
        <div class="constellation-legend">${legend}</div>
      </div>
    </div><button class="regen-btn" onclick="generate()">&#x21bb; Regenerate</button>`;
}

// INIT — build picker immediately, load JSON data in parallel
window.addEventListener('DOMContentLoaded', () => {
  buildEmojiPicker();
  loadData().catch(err => {
    console.warn('Could not load JSON data files:', err.message);
    console.warn('If using file://, please serve via a local server (e.g. python3 -m http.server)');
  });
});
